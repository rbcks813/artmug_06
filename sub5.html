<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'DnfBitbeatV2';
            src: url('//cdn.df.nexon.com/img/common/font/DNFBitBitv2.otf') format('opentype');
            font-weight: 400;
            font-display: swap;
        }

        :root {
            --bg-pink: #FEEEEE;
            --image-gray: #D9D9D9;
            --white: #FFFFFF;
            --main-font: 'DnfBitbeatV2', sans-serif;
            --accent-pink: #FFB5B5;
            --aspect-ratio: 4000 / 2250; 
            --desc-color: #AD8997;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: auto;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1180px; 
            background-color: var(--bg-pink);
            border-radius: 50px;
            padding: 30px 20px 50px 20px; 
            position: relative;
            margin: 10px auto;
        }

        .header {
            color: var(--white);
            font-size: 50px; 
            margin-bottom: 15px;
            margin-left: 75px; 
            letter-spacing: 1px;
            user-select: none;
            line-height: 1.2;
        }

        .main-wrapper {
            position: relative;
            margin: 0 75px;
            margin-bottom: 35px;
        }

        .main-display {
            width: 100%;
            aspect-ratio: var(--aspect-ratio);
            background-color: var(--image-gray);
            border-radius: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .main-image { width: 100%; height: 100%; object-fit: cover; }

        .image-desc {
            margin-top: 12px;
            color: var(--desc-color);
            font-size: 18px;
            text-align: left;
            min-height: 1.2em;
            word-break: keep-all;
        }

        .nav-btn {
            position: absolute;
            width: 45px;
            height: 45px;
            background-color: var(--white);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: var(--accent-pink);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* 메인 버튼 위치: 텍스트 영역을 제외한 이미지 중앙에 고정 */
        .main-wrapper .prev-btn { left: -65px; top: calc(50% - 15px); transform: translateY(-50%); }
        .main-wrapper .next-btn { right: -65px; top: calc(50% - 15px); transform: translateY(-50%); }

        .thumb-section {
            position: relative;
            margin: 0 75px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-nav-prev { left: 0; position: absolute; top: 50%; transform: translateY(-50%); }
        .thumb-nav-next { right: 0; position: absolute; top: 50%; transform: translateY(-50%); }

        .thumb-container {
            width: calc(100% - 120px);
            overflow: hidden;
        }

        .thumb-list {
            display: flex;
            gap: 15px; 
            list-style: none;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: max-content; /* 썸네일이 압축되지 않도록 설정 */
        }

        .thumb-item {
            width: calc((1180px - 150px - 120px - 45px) / 4); /* 계산식 보정 */
            flex: 0 0 auto;
            aspect-ratio: var(--aspect-ratio);
            background-color: var(--white);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            border: 4px solid transparent;
        }

        .thumb-item.active { border-color: var(--accent-pink); }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .loading { color: var(--white); font-size: 18px; }

        @media (max-width: 768px) {
            .container { width: 100%; padding: 20px 10px 30px 10px; border-radius: 30px; margin: 0 auto; }
            .header { font-size: 34px; margin-left: 0; text-align: center; }
            .main-wrapper { margin: 0 0 20px 0; }
            .image-desc { font-size: 15px; margin-top: 8px; padding: 0 5px; }
            
            /* 모바일 버튼 위치 보정 */
            .main-wrapper .prev-btn { left: 5px; top: calc(50% - 12px); transform: translateY(-50%); }
            .main-wrapper .next-btn { right: 5px; top: calc(50% - 12px); transform: translateY(-50%); }
            
            .nav-btn { width: 32px; height: 32px; font-size: 14px; }
            
            .thumb-section { margin: 0 5px; }
            .thumb-container { width: calc(100% - 74px); }
            .thumb-list { gap: 6px; }
            .thumb-item { 
                /* 모바일 화면 너비에 맞게 4개가 꽉 차도록 계산 */
                width: calc((100vw - 20px - 10px - 74px - 18px) / 4); 
                flex: 0 0 auto;
                border-radius: 8px; 
                border-width: 2px; 
            }
        }
    </style>
</head>
<body>

<div class="container" id="extraGalleryContainer">
    <div class="header"><span style="font-size: 0.8em;">♥</span> EXTRA</div>

    <div class="main-wrapper">
        <button class="nav-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>
        <div class="main-display" id="mainDisplay">
            <span class="loading">LOADING...</span>
        </div>
        <div class="image-desc" id="imageDesc"></div>
        <button class="nav-btn next-btn" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <div class="thumb-section">
        <button class="nav-btn thumb-nav-prev" onclick="moveThumb(-1)">&#10094;</button>
        <div class="thumb-container">
            <ul class="thumb-list" id="thumbContainer"></ul>
        </div>
        <button class="nav-btn thumb-nav-next" onclick="moveThumb(1)">&#10095;</button>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBQtd81Ch1XD9iTV6me_YRFPxEBOJpHnG27HYi5aS0OTCFYJ9NRTUWs_gtpwyq79svXPc_x4GITWlH/pub?gid=298296551&single=true&output=csv';

    let imageData = [];
    let currentIndex = 0;
    let thumbOffset = 0;

    function sendHeight() {
        const height = document.getElementById('extraGalleryContainer').offsetHeight + 40; 
        window.parent.postMessage({ type: 'resize-extra', height: height }, '*');
    }

    async function loadSheetData() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.trim()).filter(row => row !== "");
            imageData = rows.slice(1).map(row => {
                const cols = row.split(',');
                return {
                    url: cols[0].replace(/"/g, ""),
                    desc: cols[1] ? cols[1].replace(/"/g, "") : ""
                };
            });
            if(imageData.length > 0) renderGallery();
        } catch (e) { console.error('Load Error'); }
    }

    function renderGallery() {
        const mainDisplay = document.getElementById('mainDisplay');
        const thumbContainer = document.getElementById('thumbContainer');
        const imageDesc = document.getElementById('imageDesc');

        mainDisplay.innerHTML = `<img src="${imageData[currentIndex].url}" class="main-image" onload="sendHeight()">`;
        imageDesc.innerText = imageData[currentIndex].desc;
        
        thumbContainer.innerHTML = '';
        imageData.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = `thumb-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `<img src="${item.url}">`;
            li.onclick = () => { 
                currentIndex = index; 
                syncThumbOffset();
                renderGallery(); 
            };
            thumbContainer.appendChild(li);
        });
        
        // 브라우저 렌더링 후 위치 계산을 위해 아주 약간의 지연시간 부여
        setTimeout(updateThumbPosition, 50);
        sendHeight();
    }

    function changeSlide(direction) {
        if(imageData.length === 0) return;
        currentIndex = (currentIndex + direction + imageData.length) % imageData.length;
        syncThumbOffset();
        renderGallery();
    }

    function syncThumbOffset() {
        if (currentIndex < thumbOffset) {
            thumbOffset = currentIndex;
        } else if (currentIndex >= thumbOffset + 4) {
            thumbOffset = currentIndex - 3;
        }
    }

    function moveThumb(direction) {
        if (imageData.length <= 4) return;
        const maxOffset = imageData.length - 4;
        thumbOffset += direction;
        
        if (thumbOffset > maxOffset) thumbOffset = 0;
        else if (thumbOffset < 0) thumbOffset = maxOffset;
        
        updateThumbPosition();
    }

    function updateThumbPosition() {
        const list = document.getElementById('thumbContainer');
        if(!list || !list.children.length) return;
        
        // 정밀한 너비 계산을 위해 getBoundingClientRect 사용
        const itemWidth = list.children[0].getBoundingClientRect().width;
        const gap = parseFloat(window.getComputedStyle(list).gap) || 6; 
        
        list.style.transform = `translateX(-${thumbOffset * (itemWidth + gap)}px)`;
        sendHeight();
    }

    window.addEventListener('resize', () => {
        updateThumbPosition();
        sendHeight();
    });
    
    loadSheetData();
</script>

</body>
</html>
