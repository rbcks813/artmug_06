<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오 슬라이더</title>
  <style>
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');
      font-weight: 100; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');
      font-weight: 200; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');
      font-weight: 300; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
      font-weight: 600; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
      font-weight: 900; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Paperozi', sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    /* 슬라이더 카드 래퍼 */
    .slider-card {
      background: #ffffff;
      border: 1.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 1rem 1rem 0.9rem;
      margin: 0;
    }

    /* 메인 슬라이더 */
    .main-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
    }

    .slide-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .slide-meta {
      position: absolute;
      bottom: 1rem;
      left: 1.2rem;
      right: 1.2rem;
    }

    .slide-date-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 8px;
      padding: 6px 13px;
      font-family: 'Paperozi', sans-serif;
      font-weight: 500;
      font-size: 13px;
      color: #1a1a1a;
      letter-spacing: 0.03em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .slide-date-badge svg {
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* 좌우 네비게이션 버튼 */
    .nav-btn {
      position: absolute;
      top: 0;
      bottom: 0;
      margin: auto 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.32);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: background 0.2s, opacity 0.22s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .main-viewport:hover .nav-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-btn:hover {
      background: rgba(0,0,0,0.55);
    }

    .nav-prev { left: 14px; }
    .nav-next { right: 14px; }

    /* 모바일은 기존 크기 유지 */
    @media (max-width: 640px) {
      .nav-btn { width: 32px; height: 32px; font-size: 18px; }
      .nav-prev { left: 8px; }
      .nav-next { right: 8px; }
    }

    /* 스켈레톤 로딩 */
    @keyframes shimmer {
      0%   { background-position: -700px 0; }
      100% { background-position: 700px 0; }
    }

    .skeleton-wrap {
      min-width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .skeleton-main {
      flex: 1;
      background: linear-gradient(90deg, #e8e8e8 25%, #f2f2f2 50%, #e8e8e8 75%);
      background-size: 700px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .skeleton-badge {
      position: absolute;
      bottom: 1rem;
      left: 1.2rem;
      width: 160px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(90deg, #ddd 25%, #eaeaea 50%, #ddd 75%);
      background-size: 700px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .skeleton-thumb-strip {
      display: flex;
      gap: 7px;
      margin-top: 0.75rem;
    }

    .skeleton-thumb {
      flex-shrink: 0;
      width: calc((100% - 5 * 7px) / 6);
      aspect-ratio: 16 / 9;
      border-radius: 5px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f2f2f2 50%, #e8e8e8 75%);
      background-size: 700px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    /* 모바일 썸네일 크기 개선 */
    @media (max-width: 640px) {
      .thumb {
        width: 28vw;
        min-width: 90px;
      }
      .skeleton-thumb {
        width: 28vw;
        min-width: 90px;
      }
    }
    .thumb-strip {
      display: flex;
      gap: 7px;
      margin-top: 0.75rem;
      overflow-x: auto;
      padding-bottom: 3px;
      scrollbar-width: thin;
      scrollbar-color: #d0d0d0 transparent;
    }

    .thumb-strip::-webkit-scrollbar { height: 4px; }
    .thumb-strip::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 4px; }
    .thumb-strip::-webkit-scrollbar-track { background: transparent; }

    .thumb {
      flex-shrink: 0;
      /* 6개 기준으로 균등 배치 */
      width: calc((100% - 5 * 7px) / 6);
      aspect-ratio: 16 / 9;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.18s;
      position: relative;
      background: #222;
    }

    .thumb:hover { transform: translateY(-2px); }
    .thumb.active { border-color: #4dabf7; }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.7);
      transition: filter 0.2s;
    }

    .thumb.active img,
    .thumb:hover img { filter: brightness(1); }

    .thumb-num {
      position: absolute;
      bottom: 3px;
      right: 5px;
      font-family: 'Paperozi', sans-serif;
      font-weight: 500;
      font-size: 9px;
      color: rgba(255,255,255,0.85);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="slider-card">
      <!-- 메인 뷰포트 -->
      <div class="main-viewport" id="main-viewport">
        <div class="slide-track" id="slide-track"></div>

        <button class="nav-btn nav-prev" id="btn-prev" aria-label="이전 슬라이드">&#8249;</button>
        <button class="nav-btn nav-next" id="btn-next" aria-label="다음 슬라이드">&#8250;</button>
      </div>

      <!-- 썸네일 스트립 -->
      <div class="thumb-strip" id="thumb-strip"></div>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────
    // 구글 시트 CSV URL (공개 게시된 CSV 링크)
    // ─────────────────────────────────────────────
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQaE6bTXrnBQ_2rUdQZ8I5Gtr-k4U1q7FFdAE0TsQv9TStP6u24Un7LAJbVCLp_uopBrGCy53hn2ZJj/pub?gid=1301742037&single=true&output=csv';

    const CALENDAR_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>`;

    let SLIDES = [];
    let current = 0;

    // ─── CSV 파싱 ───────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      // 첫 줄은 헤더(날짜, 이미지 링크) → 건너뜀
      return lines.slice(1).map(line => {
        // 쉼표 기준 분리 (URL 안에 쉼표 없다고 가정)
        const idx = line.indexOf(',');
        if (idx === -1) return null;
        const date = line.slice(0, idx).trim();
        const img  = line.slice(idx + 1).trim();
        if (!date || !img) return null;
        return { date, img };
      }).filter(Boolean);
    }

    // ─── 슬라이더 DOM 빌드 ──────────────────────
    function build() {
      const track  = document.getElementById('slide-track');
      const thumbs = document.getElementById('thumb-strip');
      track.innerHTML  = '';
      thumbs.innerHTML = '';

      SLIDES.forEach((s, i) => {
        // 메인 슬라이드
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.innerHTML = `
          <img src="${s.img}" alt="작업일 ${s.date}" loading="lazy">
          <div class="slide-meta">
            <div class="slide-date-badge">
              ${CALENDAR_ICON}
              작업일: ${s.date}
            </div>
          </div>`;
        track.appendChild(slide);

        // 썸네일
        const th = document.createElement('div');
        th.className = 'thumb' + (i === 0 ? ' active' : '');
        th.innerHTML = `<img src="${s.img}" alt="작업일 ${s.date}" loading="lazy"><span class="thumb-num">${String(i + 1).padStart(2, '0')}</span>`;
        th.addEventListener('click', () => goTo(i));
        thumbs.appendChild(th);
      });

      goTo(0);
    }

    // ─── 슬라이드 이동 ──────────────────────────
    function goTo(idx) {
      if (!SLIDES.length) return;
      current = (idx + SLIDES.length) % SLIDES.length;

      document.getElementById('slide-track').style.transform =
        `translateX(-${current * 100}%)`;

      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === current);
      });

      const strip   = document.getElementById('thumb-strip');
      const activeT = strip.querySelectorAll('.thumb')[current];
      if (activeT) activeT.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    // ─── 스켈레톤 로딩 ──────────────────────────
    function showLoading() {
      const track  = document.getElementById('slide-track');
      const thumbs = document.getElementById('thumb-strip');

      // 메인 스켈레톤
      track.innerHTML = `
        <div class="skeleton-wrap">
          <div class="skeleton-main"></div>
          <div class="skeleton-badge"></div>
        </div>`;

      // 썸네일 스켈레톤 (6개)
      thumbs.innerHTML = Array(6).fill(0).map(() =>
        `<div class="skeleton-thumb"></div>`
      ).join('');
    }

    function showError() {
      // 에러 시에도 스켈레톤 유지 + 조용히 재시도
    }

    // ─── 구글 시트 CSV fetch ─────────────────────
    async function loadFromSheet(retryCount = 0) {
      showLoading();
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        SLIDES = parseCSV(text);
        if (!SLIDES.length) throw new Error('empty');
        build();
      } catch (e) {
        console.warn('슬라이더 로드 실패, 재시도 중...', e.message);
        // 최대 3회 재시도 (2초 간격), 계속 실패 시 스켈레톤 유지
        if (retryCount < 3) {
          setTimeout(() => loadFromSheet(retryCount + 1), 2000);
        }
        // 에러 메시지 대신 스켈레톤 그대로 유지
      }
    }

    // ─── 이벤트 바인딩 ──────────────────────────
    document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    let touchStartX = 0;
    const vp = document.getElementById('main-viewport');
    vp.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    vp.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    });

    // ─── 임베드 자동 높이 조절 ──────────────────
    function sendHeight() {
      window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
    }
    window.addEventListener('resize', sendHeight);
    new ResizeObserver(sendHeight).observe(document.body);

    // ─── 시작 ───────────────────────────────────
    loadFromSheet();
  </script>
</body>
</html>
