<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오</title>
    <style>
        /* Paperozi 폰트 설정 */
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2'); font-weight: 100; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
        @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }

        :root {
            --point-pink: #E38AA6;
            --bg-pink: #FFF5F7;
            --white: #FFFFFF;
            --text-dark: #4A4A4A;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Paperozi', sans-serif;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            color: var(--text-dark);
            overflow: hidden; /* 높이 조절을 위해 불필요한 스크롤바 제거 */
        }

        .portfolio-wrap {
            width: 100%;
            max-width: 960px;
            text-align: center;
        }

        .header-title {
            font-weight: 800;
            font-size: 2.2rem;
            color: var(--point-pink);
            margin-bottom: 40px;
            letter-spacing: -0.5px;
            display: inline-block;
            position: relative;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            background-color: var(--point-pink);
            border-radius: 2px;
            opacity: 0.5;
        }

        .main-slider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-frame {
            position: relative;
            flex: 1;
            padding-bottom: 56.25%;
            height: 0;
            background: #fdfdfd;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(227, 138, 166, 0.15);
            border: 8px solid var(--bg-pink);
        }

        .video-frame iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .nav-btn {
            background: var(--white);
            border: 2px solid var(--bg-pink);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .nav-btn svg { fill: var(--point-pink); width: 20px; height: 20px; }
        .nav-btn:hover { background-color: var(--point-pink); transform: scale(1.1); border-color: var(--point-pink); }
        .nav-btn:hover svg { fill: var(--white); }

        .thumbnail-area { position: relative; max-width: 800px; margin: 0 auto; }
        .thumbnail-list { display: flex; gap: 16px; overflow-x: auto; padding: 15px 5px; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; }
        .thumbnail-list::-webkit-scrollbar { display: none; }

        .thumb-card {
            flex: 0 0 160px;
            height: 90px;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            background: #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .thumb-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); transition: 0.3s; }
        .thumb-card.active { border-color: var(--point-pink); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(227, 138, 166, 0.3); }
        .thumb-card.active img { filter: grayscale(0%); }
        .thumb-card:hover:not(.active) { transform: translateY(-4px); border-color: var(--bg-pink); }

        .video-counter { margin-top: 15px; font-size: 0.9rem; font-weight: 500; color: var(--point-pink); background: var(--bg-pink); padding: 5px 15px; border-radius: 20px; display: inline-block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 600; color: var(--point-pink); }
    </style>
</head>
<body>

<div class="portfolio-wrap" id="portfolioBody">
    <div class="header-title">포트폴리오</div>
    <div class="main-slider-container">
        <button class="nav-btn" onclick="moveStep(-1)"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
        <div class="video-frame" id="mainFrame"><div id="loader">영상을 불러오는 중이에요...</div></div>
        <button class="nav-btn" onclick="moveStep(1)"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
    </div>
    <div class="thumbnail-area">
        <div class="thumbnail-list" id="thumbList"></div>
        <div class="video-counter" id="counter">0 / 0</div>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMP35aIuQ6YC4tokgQpcNDlHBF8fAUd-qAbvytXflz5esxQWHLpazaldrBFmzDfbYkDJKVP8D21i--/pub?gid=608523771&single=true&output=csv';
    let videos = [];
    let curIdx = 0;

    function getID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.trim().match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function updateView(idx) {
        if (idx < 0 || idx >= videos.length) return;
        curIdx = idx;
        const vidId = videos[curIdx];
        const frame = document.getElementById('mainFrame');
        frame.innerHTML = `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
        document.getElementById('counter').innerText = `${curIdx + 1} / ${videos.length}`;
        const cards = document.querySelectorAll('.thumb-card');
        cards.forEach((card, i) => {
            if(i === curIdx) {
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else { card.classList.remove('active'); }
        });
        sendHeight(); // 영상 변경 시 높이 재계산
    }

    function moveStep(step) {
        let next = curIdx + step;
        if (next < 0) next = videos.length - 1;
        if (next >= videos.length) next = 0;
        updateView(next);
    }

    // --- 추가된 높이 자동 조절 스크립트 ---
    function sendHeight() {
        const height = document.getElementById('portfolioBody').offsetHeight + 80; // 패딩 포함 여유값
        window.parent.postMessage({ type: 'resizePortfolio', height: height }, '*');
    }

    async function init() {
        try {
            const res = await fetch(sheetUrl);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            const listEl = document.getElementById('thumbList');
            lines.forEach((line) => {
                const id = getID(line);
                if (id) videos.push(id);
            });
            if (videos.length > 0) {
                videos.forEach((id, i) => {
                    const card = document.createElement('div');
                    card.className = 'thumb-card';
                    card.innerHTML = `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">`;
                    card.onclick = () => updateView(i);
                    listEl.appendChild(card);
                });
                updateView(0);
            }
            setTimeout(sendHeight, 500); // 로드 후 높이 전송
        } catch (e) { console.error(e); }
    }

    window.addEventListener('resize', sendHeight);
    init();
</script>
</body>
</html>
