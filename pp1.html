<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Height Video Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --main-beige: #D2B48C;
            --dark-beige: #A68A64;
            /* PC 버전 영상 높이 */
            --video-height: 450px;
        }

        @media (max-width: 768px) {
            :root {
                /* 모바일 버전 영상 높이 (화면 크기에 맞춰 축소) */
                --video-height: 350px;
            }
        }

        body {
            margin: 0;
            padding: 20px 0;
            background: transparent;
            font-family: 'Pretendard', sans-serif;
        }

        /* 카테고리 버튼 */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 24px;
            border: 1.5px solid var(--main-beige);
            background: #fff;
            color: var(--dark-beige);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .filter-btn.active {
            background: var(--main-beige);
            color: white;
        }

        /* 슬라이더 메인 컨테이너 */
        .swiper-container-wrapper {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .swiper {
            width: 100%;
            padding-bottom: 60px !important;
        }

        /* 높이 통일을 위한 슬라이드 설정 */
        .swiper-slide {
            width: auto; /* 내용물(영상 너비)에 따라 가변적 */
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.4s;
        }

        .swiper-slide-active {
            opacity: 1;
        }

        /* 영상 프레임 스타일 */
        .video-container {
            height: var(--video-height); /* 세로 크기 고정 */
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        /* 비율에 따른 너비 설정 (높이는 고정, 너비가 바뀜) */
        .ratio-long { aspect-ratio: 16 / 9; }
        .ratio-short { aspect-ratio: 9 / 16; }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 태그 */
        .tag-box {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .tag-item {
            color: var(--dark-beige);
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* 화살표 버튼 */
        .swiper-button-next, .swiper-button-prev {
            width: 44px !important;
            height: 44px !important;
            background: #fff;
            border: 1px solid var(--main-beige);
            border-radius: 50%;
            color: var(--dark-beige) !important;
            top: calc(var(--video-height) / 2) !important; /* 영상 높이의 딱 절반 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 16px !important;
            font-weight: bold;
        }

        .swiper-button-prev { left: 5px !important; }
        .swiper-button-next { right: 5px !important; }

        .swiper-pagination-bullet-active { background: var(--main-beige) !important; }

        #no-data {
            display: none;
            text-align: center;
            padding: 60px;
            color: var(--dark-beige);
            border: 2px dashed var(--main-beige);
            margin: 0 20px;
            border-radius: 20px;
        }

        /* 모바일 최적화 (화면보다 넓어지는 것 방지) */
        @media (max-width: 600px) {
            .video-container.ratio-long {
                width: calc(100vw - 120px); /* 화면 너비에 맞춤 */
                height: auto;
            }
            .swiper-container-wrapper { padding: 0 40px; }
            .swiper-button-next, .swiper-button-prev { width: 36px !important; height: 36px !important; }
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterContent('전체')">전체</button>
        <button class="filter-btn" onclick="filterContent('롱폼')">롱폼</button>
        <button class="filter-btn" onclick="filterContent('숏폼')">숏폼</button>
    </div>

    <div id="slider-wrapper" class="swiper-container-wrapper">
        <div class="swiper">
            <div class="swiper-wrapper" id="video-list"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <div id="no-data">등록된 포트폴리오 영상이 없습니다.</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_Lqcb6PVuS3aRdwOzzAK9a7q9_BgTm_Hih063KyRXtYLc7KIIO85xk7nfuGi8IzRJiuJKVmNZmyU/pub?gid=0&single=true&output=csv';
        let allVideos = [];
        let swiperInstance = null;

        function getEmbedUrl(url) {
            if (!url) return '';
            url = url.trim();
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
                else if (url.includes('shorts/')) videoId = url.split('shorts/')[1].split('?')[0];
                else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }
            if (url.includes('sooplive.co.kr')) {
                const parts = url.split('/');
                const vodId = parts[parts.length - 1].split('?')[0];
                return `https://vod.sooplive.co.kr/player/${vodId}/embed`;
            }
            return url;
        }

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                allVideos = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return null;
                    return {
                        type: cols[0]?.replace(/"/g, '').trim(),
                        originalUrl: cols[1]?.replace(/"/g, '').trim(),
                        tags: cols[2]?.replace(/"/g, '').trim() || ""
                    };
                }).filter(v => v && v.originalUrl);
                renderVideos('전체');
            } catch (e) {
                document.getElementById('no-data').style.display = 'block';
            }
        }

        function renderVideos(category) {
            const listContainer = document.getElementById('video-list');
            const noData = document.getElementById('no-data');
            const sliderWrapper = document.getElementById('slider-wrapper');
            
            if (swiperInstance) swiperInstance.destroy(true, true);
            listContainer.innerHTML = '';

            const filtered = category === '전체' ? allVideos : allVideos.filter(v => v.type === category);

            if (filtered.length === 0) {
                noData.style.display = 'block';
                sliderWrapper.style.display = 'none';
                return;
            } else {
                noData.style.display = 'none';
                sliderWrapper.style.display = 'block';
            }

            filtered.forEach(video => {
                const embedUrl = getEmbedUrl(video.originalUrl);
                const isShort = video.type === '숏폼';
                const ratioClass = isShort ? 'ratio-short' : 'ratio-long';
                const tagHtml = video.tags.split(',')
                    .filter(t => t.trim() !== "")
                    .map(t => `<span class="tag-item">#${t.trim()}</span>`)
                    .join(' ');

                const slide = `
                    <div class="swiper-slide">
                        <div class="video-container ${ratioClass}">
                            <iframe src="${embedUrl}" allowfullscreen 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                            </iframe>
                        </div>
                        <div class="tag-box">${tagHtml}</div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', slide);
            });

            swiperInstance = new Swiper('.swiper', {
                slidesPerView: 'auto', /* 높이 고정 및 가변 너비 대응 */
                spaceBetween: 30,
                centeredSlides: true,
                loop: filtered.length > 2,
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            });
        }

        function filterContent(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderVideos(category);
        }

        init();
    </script>
</body>
</html>
