<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Platform Video Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --main-beige: #D2B48C;
            --dark-beige: #A68A64;
            --light-beige: #FDFBF8;
        }

        body {
            margin: 0;
            padding: 20px 0;
            background: transparent;
            font-family: 'Pretendard', sans-serif;
        }

        /* 카테고리 버튼 */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-btn {
            padding: 8px 24px;
            border: 1.5px solid var(--main-beige);
            background: #fff;
            color: var(--dark-beige);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--main-beige);
            color: white;
        }

        /* 슬라이더 메인 컨테이너 */
        .swiper-container-wrapper {
            position: relative;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 50px;
        }

        .swiper {
            width: 100%;
            padding-bottom: 50px !important;
        }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.4s;
        }

        .swiper-slide-active {
            opacity: 1;
        }

        /* 영상 프레임 */
        .video-container {
            width: 100%;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .ratio-long { aspect-ratio: 16 / 9; width: 100%; }
        .ratio-short { aspect-ratio: 9 / 16; width: 280px; margin: 0 auto; }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* 태그 */
        .tag-box {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 24px;
        }

        .tag-item {
            color: var(--dark-beige);
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* 화살표 스타일: 원형 배경 및 위치 고정 */
        .swiper-button-next, .swiper-button-prev {
            width: 44px !important;
            height: 44px !important;
            background: #fff;
            border: 1px solid var(--main-beige);
            border-radius: 50%;
            color: var(--dark-beige) !important;
            top: 40% !important; /* 영상 높이 기준 중앙 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 18px !important;
            font-weight: bold;
        }

        .swiper-button-prev { left: 0px !important; }
        .swiper-button-next { right: 0px !important; }

        .swiper-pagination-bullet-active { background: var(--main-beige) !important; }

        #no-data {
            display: none;
            text-align: center;
            padding: 60px;
            color: var(--dark-beige);
            border: 2px dashed var(--main-beige);
            margin: 0 20px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .swiper-container-wrapper { padding: 0 40px; }
            .ratio-short { width: 220px; }
            .swiper-button-next, .swiper-button-prev { width: 36px !important; height: 36px !important; }
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterContent('전체')">전체</button>
        <button class="filter-btn" onclick="filterContent('롱폼')">롱폼</button>
        <button class="filter-btn" onclick="filterContent('숏폼')">숏폼</button>
    </div>

    <div id="slider-wrapper" class="swiper-container-wrapper">
        <div class="swiper">
            <div class="swiper-wrapper" id="video-list"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <div id="no-data">등록된 포트폴리오 영상이 없습니다.</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_Lqcb6PVuS3aRdwOzzAK9a7q9_BgTm_Hih063KyRXtYLc7KIIO85xk7nfuGi8IzRJiuJKVmNZmyU/pub?gid=0&single=true&output=csv';
        let allVideos = [];
        let swiperInstance = null;

        // 링크를 임베드용 주소로 변환하는 함수
        function getEmbedUrl(url) {
            if (!url) return '';
            url = url.trim();

            // 1. 유튜브 처리
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else if (url.includes('shorts/')) {
                    videoId = url.split('shorts/')[1].split('?')[0];
                } else if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                }
                return `https://www.youtube.com/embed/${videoId}`;
            }

            // 2. SOOP (아프리카TV) 처리
            if (url.includes('sooplive.co.kr')) {
                // vod.sooplive.co.kr/player/11223344 -> /embed 추가
                if (!url.includes('/embed')) {
                    // 마지막 숫자가 ID라고 가정하고 추출 (구조에 따라 조정 가능)
                    const parts = url.split('/');
                    const vodId = parts[parts.length - 1].split('?')[0];
                    return `https://vod.sooplive.co.kr/player/${vodId}/embed`;
                }
                return url;
            }

            return url; // 그 외는 그대로 반환
        }

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                
                allVideos = rows.map(row => {
                    // CSV 파싱 시 콤마 처리 보정
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return null;
                    
                    return {
                        type: cols[0]?.replace(/"/g, '').trim(),
                        originalUrl: cols[1]?.replace(/"/g, '').trim(),
                        tags: cols[2]?.replace(/"/g, '').trim() || ""
                    };
                }).filter(v => v && v.originalUrl);

                renderVideos('전체');
            } catch (e) {
                document.getElementById('no-data').style.display = 'block';
            }
        }

        function renderVideos(category) {
            const listContainer = document.getElementById('video-list');
            const noData = document.getElementById('no-data');
            const sliderWrapper = document.getElementById('slider-wrapper');
            
            if (swiperInstance) swiperInstance.destroy(true, true);
            listContainer.innerHTML = '';

            const filtered = category === '전체' ? allVideos : allVideos.filter(v => v.type === category);

            if (filtered.length === 0) {
                noData.style.display = 'block';
                sliderWrapper.style.display = 'none';
                return;
            } else {
                noData.style.display = 'none';
                sliderWrapper.style.display = 'block';
            }

            filtered.forEach(video => {
                const embedUrl = getEmbedUrl(video.originalUrl);
                const isShort = video.type === '숏폼';
                const ratioClass = isShort ? 'ratio-short' : 'ratio-long';
                const tagHtml = video.tags.split(',')
                    .filter(t => t.trim() !== "")
                    .map(t => `<span class="tag-item">#${t.trim()}</span>`)
                    .join(' ');

                const slide = `
                    <div class="swiper-slide">
                        <div class="video-container ${ratioClass}">
                            <iframe src="${embedUrl}" allowfullscreen 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                            </iframe>
                        </div>
                        <div class="tag-box">${tagHtml}</div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', slide);
            });

            swiperInstance = new Swiper('.swiper', {
                slidesPerView: 1,
                spaceBetween: 20,
                centeredSlides: true,
                loop: filtered.length > 1,
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                breakpoints: {
                    768: { slidesPerView: 1.5, spaceBetween: 40 }
                }
            });
        }

        function filterContent(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderVideos(category);
        }

        init();
    </script>
</body>
</html>
