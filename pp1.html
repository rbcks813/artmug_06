<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Height Video Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --main-beige: #D2B48C;
            --dark-beige: #A68A64;
            /* PC 버전 높이 */
            --vh-pc: 450px;
            /* 모바일 버전 높이 (화면 너비를 넘지 않도록 조정) */
            --vh-mobile: 200px; 
        }

        body {
            margin: 0;
            padding: 20px 0;
            background: transparent;
            font-family: 'Pretendard', sans-serif;
        }

        /* 카테고리 버튼 */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1.5px solid var(--main-beige);
            background: #fff;
            color: var(--dark-beige);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--main-beige);
            color: white;
        }

        /* 슬라이더 전체 컨테이너 */
        .swiper-container-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .swiper {
            width: 100%;
            padding-bottom: 50px !important;
        }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: auto; /* 너비는 비율에 따라 자동 */
            opacity: 0.2;
            transition: opacity 0.4s;
        }

        .swiper-slide-active {
            opacity: 1;
        }

        /* ⭐ 핵심: 모든 영상 컨테이너의 세로 높이를 동일하게 강제 */
        .video-container {
            position: relative;
            height: var(--vh-pc); /* PC 높이 고정 */
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* 비율에 따른 너비 설정 */
        .ratio-long { aspect-ratio: 16 / 9; }
        .ratio-short { aspect-ratio: 9 / 16; }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .tag-box {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .tag-item {
            color: var(--dark-beige);
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* 화살표 버튼 */
        .swiper-button-next, .swiper-button-prev {
            width: 40px !important;
            height: 40px !important;
            background: #fff;
            border: 1px solid var(--main-beige);
            border-radius: 50%;
            color: var(--dark-beige) !important;
            top: calc(var(--vh-pc) / 2) !important; /* 영상 높이의 딱 절반 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 14px !important;
            font-weight: bold;
        }

        .swiper-button-prev { left: 10px !important; }
        .swiper-button-next { right: 10px !important; }

        .swiper-pagination-bullet-active { background: var(--main-beige) !important; }

        /* ⭐ 모바일 환경 최적화 */
        @media (max-width: 768px) {
            .video-container {
                height: var(--vh-mobile); /* 모바일 높이로 강제 변경 */
            }
            .swiper-button-next, .swiper-button-prev {
                top: calc(var(--vh-mobile) / 2) !important; /* 줄어든 높이의 절반 */
            }
            .swiper-slide {
                padding: 0 10px;
            }
        }

        #no-data {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--dark-beige);
            border: 2px dashed var(--main-beige);
            margin: 0 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterContent('전체')">전체</button>
        <button class="filter-btn" onclick="filterContent('롱폼')">롱폼</button>
        <button class="filter-btn" onclick="filterContent('숏폼')">숏폼</button>
    </div>

    <div id="slider-wrapper" class="swiper-container-wrapper">
        <div class="swiper">
            <div class="swiper-wrapper" id="video-list"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <div id="no-data">등록된 영상이 없습니다.</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_Lqcb6PVuS3aRdwOzzAK9a7q9_BgTm_Hih063KyRXtYLc7KIIO85xk7nfuGi8IzRJiuJKVmNZmyU/pub?gid=0&single=true&output=csv';
        let allVideos = [];
        let swiperInstance = null;

        function getEmbedUrl(url) {
            if (!url) return '';
            url = url.trim();
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
                else if (url.includes('shorts/')) videoId = url.split('shorts/')[1].split('?')[0];
                else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }
            if (url.includes('sooplive.co.kr')) {
                const parts = url.split('/');
                const vodId = parts[parts.length - 1].split('?')[0];
                return `https://vod.sooplive.co.kr/player/${vodId}/embed`;
            }
            return url;
        }

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                allVideos = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return null;
                    return {
                        type: cols[0]?.replace(/"/g, '').trim(),
                        url: cols[1]?.replace(/"/g, '').trim(),
                        tags: cols[2]?.replace(/"/g, '').trim() || ""
                    };
                }).filter(v => v && v.url);
                renderVideos('전체');
            } catch (e) {
                document.getElementById('no-data').style.display = 'block';
            }
        }

        function renderVideos(category) {
            const listContainer = document.getElementById('video-list');
            const noData = document.getElementById('no-data');
            const sliderWrapper = document.getElementById('slider-wrapper');
            
            if (swiperInstance) swiperInstance.destroy(true, true);
            listContainer.innerHTML = '';

            const filtered = category === '전체' ? allVideos : allVideos.filter(v => v.type === category);

            if (filtered.length === 0) {
                noData.style.display = 'block';
                sliderWrapper.style.display = 'none';
                return;
            } else {
                noData.style.display = 'none';
                sliderWrapper.style.display = 'block';
            }

            filtered.forEach(video => {
                const ratioClass = video.type === '숏폼' ? 'ratio-short' : 'ratio-long';
                const tagHtml = video.tags.split(',')
                    .filter(t => t.trim() !== "")
                    .map(t => `<span class="tag-item">#${t.trim()}</span>`)
                    .join(' ');

                const slide = `
                    <div class="swiper-slide">
                        <div class="video-container ${ratioClass}">
                            <iframe src="${getEmbedUrl(video.url)}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                        </div>
                        <div class="tag-box">${tagHtml}</div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', slide);
            });

            swiperInstance = new Swiper('.swiper', {
                slidesPerView: 'auto',
                spaceBetween: 20,
                centeredSlides: true,
                loop: filtered.length > 1,
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            });
        }

        function filterContent(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderVideos(category);
        }

        init();
    </script>
</body>
</html>
