<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Portfolio Slider</title>
    <style>
        :root {
            --main-color: #D1C4E9;
            --main-dark: #B39DDB;
            /* 기본 비율 설정 */
            --pc-ratio: 16 / 9;    /* PC: 가로로 긴 형태 */
            --mobile-ratio: 1 / 1.1; /* 모바일: 세로로 조금 더 긴 형태 */
        }

        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: transparent; }

        .pf-container {
            width: 100%;
            max-width: 850px; /* 전체 최대 너비 */
            margin: 0 auto;
        }

        /* [핵심 수정] 가변 비율 및 최대 높이 제한 */
        .pf-image-box {
            position: relative;
            width: 100%;
            aspect-ratio: var(--pc-ratio); /* PC 기본 비율 */
            max-height: 500px; /* PC에서 높이가 500px을 넘지 않도록 제한 */
            overflow: hidden;
            border-radius: 12px;
            background-color: #f8f8f8;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        /* 모바일 환경 설정 */
        @media (max-width: 768px) {
            .pf-image-box {
                aspect-ratio: var(--mobile-ratio); /* 모바일은 정사각형에 가깝게 */
                max-height: 450px; /* 모바일 최대 높이 제한 */
            }
        }

        .pf-slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pf-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 이미지 영역: 이미지와 제목 바 사이 여백 최소화 */
        .pf-img-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
            background-color: #f9f9f9;
        }

        .pf-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 비율 유지하며 꽉 채움 */
        }

        /* 제목 바 디자인 (고정 높이) */
        .pf-info-bar {
            width: 100%;
            height: 55px; /* 제목 영역 높이 고정 */
            padding: 0 20px;
            background: #ffffff;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .pf-info-left { display: flex; align-items: center; overflow: hidden; }

        .pf-tag {
            background-color: var(--main-color);
            color: #512DA8;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .pf-title {
            color: #444;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pf-counter { font-size: 11px; color: #aaa; flex-shrink: 0; }

        /* 네비게이션 버튼: 호버 시 노출 */
        .pf-nav-btn {
            position: absolute;
            top: calc(50% - 27px); /* 제목 바 제외 이미지 영역 중앙 */
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--main-dark);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .pf-image-box:hover .pf-nav-btn { opacity: 1; }
        @media (max-width: 768px) { .pf-nav-btn { opacity: 0.8; } }

        .pf-prev { left: 10px; }
        .pf-next { right: 10px; }

        /* 하단 도트 */
        .pf-dots {
            display: flex;
            justify-content: center;
            gap: 7px;
            padding: 15px 0;
        }

        .pf-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #e5e5e5;
            cursor: pointer;
            transition: 0.3s;
        }

        .pf-dot.active {
            background-color: var(--main-color);
            width: 18px;
            border-radius: 3px;
        }

        #pf-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="pf-container">
        <div class="pf-image-box">
            <div id="pf-loading">Loading...</div>
            <div class="pf-slider" id="pfSlider"></div>
            <button class="pf-nav-btn pf-prev" onclick="moveSlide(-1)">❮</button>
            <button class="pf-nav-btn pf-next" onclick="moveSlide(1)">❯</button>
        </div>
        <div class="pf-dots" id="pfDots"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ--VAhG5Z3qrGYbgfpb-oex3JV8bao0LjzXY3m1Tv1qky655f51KyPRJVPwFWbLXJEn_0MGI498vB6/pub?gid=0&single=true&output=csv';
        const slider = document.getElementById('pfSlider');
        const dotsContainer = document.getElementById('pfDots');
        const loading = document.getElementById('pf-loading');
        let currentIndex = 0;
        let totalSlides = 0;

        async function fetchPortfolioData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== ""); 
                const items = rows.map(row => {
                    const parts = row.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                    if (parts) {
                        return {
                            link: parts[0].replace(/"/g, '').trim(),
                            desc: parts[1] ? parts[1].replace(/"/g, '').trim() : 'Portfolio'
                        };
                    }
                    return null;
                }).filter(item => item && item.link);
                renderSlider(items);
            } catch (e) { loading.innerText = 'Connection Error'; }
        }

        function renderSlider(items) {
            loading.style.display = 'none';
            totalSlides = items.length;
            items.forEach((item, i) => {
                const slide = document.createElement('div');
                slide.classList.add('pf-slide');
                slide.innerHTML = `
                    <div class="pf-img-wrapper"><img src="${item.link}"></div>
                    <div class="pf-info-bar">
                        <div class="pf-info-left">
                            <span class="pf-tag">INFO</span>
                            <span class="pf-title">${item.desc}</span>
                        </div>
                        <div class="pf-counter">${i+1} / ${totalSlides}</div>
                    </div>`;
                slider.appendChild(slide);
                const dot = document.createElement('div');
                dot.classList.add('pf-dot');
                if (i === 0) dot.classList.add('active');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            });
        }

        function updateSlider() {
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
            document.querySelectorAll('.pf-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        window.moveSlide = function(direction) {
            if (totalSlides === 0) return;
            currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        function goToSlide(index) { currentIndex = index; updateSlider(); }

        fetchPortfolioData();

        let touchStartX = 0;
        slider.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        slider.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) moveSlide(1);
            if (touchEndX - touchStartX > 50) moveSlide(-1);
        }, {passive: true});
    </script>
</body>
</html>
