<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 폰트 설정 */
        @font-face {
            font-family: 'DnfBitbeatV2';
            src: url('//cdn.df.nexon.com/img/common/font/DNFBitBitv2.otf') format('opentype');
            font-weight: 400;
            font-display: swap;
        }

        :root {
            --main-pink: #FEEEEE; 
            --card-white: #FFFFFF;
            --text-dark: #555555;
            --title-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 50px 0;
            background-color: #ffffff;
            font-family: 'DnfBitbeatV2', sans-serif;
            display: flex;
            justify-content: center;
            /* [수정] 화면 밖으로 넘치는 현상을 막아 쏠림 방지 */
            overflow-x: hidden; 
            width: 100%; 
            box-sizing: border-box;
        }

        .collab-wrapper {
            background-color: var(--main-pink);
            width: 1180px;
            max-width: 95%; /* [수정] PC 환경에서도 창이 좁아질 때 대비 */
            margin: 0 auto; /* [수정] 강제 중앙 정렬 보장 */
            border-radius: 50px;
            padding: 60px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        .header {
            text-align: left;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .header h1 {
            font-size: 50px; 
            color: var(--title-white);
            margin: 0;
            letter-spacing: 2px;
        }

        .header h1 .heart-icon {
            font-size: 0.8em;
        }

        .header p {
            font-size: 26px;
            color: var(--title-white);
            margin-top: 10px;
            opacity: 0.9;
        }

        .collab-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            background-color: var(--card-white);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .author-name {
            margin: 0;
            font-size: 24px;
            color: #756271;
        }

        .description {
            font-size: 15px;
            color: var(--text-dark);
            line-height: 1.6;
            word-break: keep-all;
            min-height: 48px;
        }

        .link-btn {
            background-color: #756271;
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .link-btn:hover {
            background-color: #5a4b57;
            transform: translateY(-2px);
        }

        .footer-text {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-size: 14px; 
            color: #756271;
            line-height: 1.8;
            text-align: left;
            padding: 0 20px 20px 20px;
            white-space: nowrap; 
        }

        @media (max-width: 1200px) {
            .collab-wrapper { width: 95%; padding: 40px; }
        }
        
        /* [수정] 모바일 최적화 및 쏠림 방지 세부 조정 */
        @media (max-width: 768px) {
            body { padding: 20px 0; }
            .collab-wrapper { 
                width: 90%; /* 모바일에서 좌우 여백을 조금 더 확보 */
                padding: 30px 15px; /* 안쪽 여백 축소 */
                border-radius: 30px; 
            }
            .header { margin-bottom: 30px; padding-left: 0; }
            .header h1 { font-size: 32px; } /* 텍스트 겹침 방지 축소 */
            .header h1 .heart-icon { font-size: 0.8em; } 
            .header p { font-size: 16px; } 
            .collab-grid { grid-template-columns: 1fr; gap: 20px; }
            .info-area { padding: 20px; }
            
            /* [핵심] 3줄 유지 시 모바일 화면을 찢고 나가지 않도록 조정 */
            .footer-text { 
                padding: 0; /* 불필요한 좌우 여백 제거 */
                font-size: 11px; /* 글씨 크기 축소 */
                letter-spacing: -0.5px; /* 자간 축소 */
            } 
        }
    </style>
</head>
<body>

<div class="collab-wrapper">
    <div class="header">
        <h1><span class="heart-icon">♥</span> COLLAB</h1>
        <p>일러스트 5만원 할인 + 표정 3종</p>
    </div>

    <div class="collab-grid" id="collab-grid">
        <div class="footer-text" id="static-footer">
            리깅 작가님과 협력하여,<br>
            캐릭터의 매력이 돋보이는 모델이 나올 수 있도록<br>
            컨펌에 함께 참여하고 있습니다 ♥
        </div>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBQtd81Ch1XD9iTV6me_YRFPxEBOJpHnG27HYi5aS0OTCFYJ9NRTUWs_gtpwyq79svXPc_x4GITWlH/pub?gid=866561416&single=true&output=csv';

    let lastHeight = 0;

    function sendHeightToParent() {
        const wrapper = document.querySelector('.collab-wrapper');
        if (wrapper) {
            const bodyStyle = window.getComputedStyle(document.body);
            const paddingTop = parseInt(bodyStyle.paddingTop) || 0;
            const paddingBottom = parseInt(bodyStyle.paddingBottom) || 0;
            
            const totalHeight = wrapper.offsetHeight + paddingTop + paddingBottom; 
            
            if (Math.abs(lastHeight - totalHeight) > 5) { 
                window.parent.postMessage({ type: 'resize-collab', height: totalHeight }, '*');
                lastHeight = totalHeight;
            }
        }
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.trim().match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function parseCSV(text) {
        const result = [];
        let row = [];
        let col = "";
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let next = text[i+1];

            if (char === '"' && insideQuotes && next === '"') { col += '"'; i++; }
            else if (char === '"') { insideQuotes = !insideQuotes; }
            else if (char === ',' && !insideQuotes) { row.push(col); col = ""; }
            else if (char === '\n' && !insideQuotes) { row.push(col); result.push(row); row = []; col = ""; }
            else if (char !== '\r') { col += char; }
        }
        if (col || row.length > 0) { row.push(col); result.push(row); }
        return result;
    }

    async function fetchCollabData() {
        const grid = document.getElementById('collab-grid');
        const footer = document.getElementById('static-footer');
        
        try {
            const response = await fetch(sheetUrl);
            if (!response.ok) throw new Error('데이터 응답 에러');
            
            const rawData = await response.text();
            
            grid.querySelectorAll('.card').forEach(c => c.remove());

            const rows = parseCSV(rawData);
            
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i];
                if (columns.length < 4 || !columns[0].trim()) continue;

                const name = columns[0].trim();
                const benefit = columns[1].trim().replace(/\n/g, '<br>');
                const videoUrl = columns[2].trim();
                const link = columns[3].trim();

                const videoId = getYoutubeId(videoUrl);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="video-container">
                        ${videoId ? `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>` : `<div style="color:#ccc; display:flex; align-items:center; justify-content:center; height:100%;">영상 준비 중</div>`}
                    </div>
                    <div class="info-area">
                        <h3 class="author-name">${name}</h3>
                        <p class="description">${benefit}</p>
                        <a href="${link}" target="_blank" class="link-btn">작가 페이지 이동</a>
                    </div>
                `;
                
                grid.insertBefore(card, footer);
            }

            requestAnimationFrame(sendHeightToParent);

        } catch (error) {
            console.error('오류 발생:', error);
        }
    }

    fetchCollabData();
    window.addEventListener('resize', sendHeightToParent);
</script>

</body>
</html>
