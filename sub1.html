<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가격표 임베드 페이지</title>
    <style>
        /* 폰트 설정 */
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: transparent; /* 배경 투명 */
            font-family: 'Paperlogy', -apple-system, sans-serif;
            color: #4A3E31;
            overflow: hidden; /* 내부 스크롤 방지 */
        }

        .price-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            color: #332B24;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #E8E2D9;
        }

        .section-title::before {
            content: '';
            width: 6px;
            height: 22px;
            background: #A68B6D; 
            border-radius: 3px;
        }

        .price-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .price-item {
            background: #FFFFFF;
            padding: 18px 22px;
            border-radius: 16px;
            border: 1px solid #E8E2D9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(166, 139, 109, 0.05);
            flex: 1 1 300px; 
            min-width: 280px;
        }

        .price-item:hover {
            transform: translateY(-3px);
            border-color: #A68B6D;
            box-shadow: 0 10px 20px rgba(166, 139, 109, 0.1);
        }

        .item-name {
            font-size: 15px;
            font-weight: 700;
            color: #5D5043;
            word-break: keep-all;
        }

        .item-price {
            font-size: 17px;
            font-weight: 900;
            color: #A68B6D;
            white-space: nowrap;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-weight: 700;
            color: #A68B6D;
        }
    </style>
</head>
<body>

<div class="price-container" id="price-board">
    <div class="loading">가격 정보를 실시간으로 구성 중입니다...</div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_Lqcb6PVuS3aRdwOzzAK9a7q9_BgTm_Hih063KyRXtYLc7KIIO85xk7nfuGi8IzRJiuJKVmNZmyU/pub?gid=665563680&single=true&output=csv';

    // [중요] 부모 페이지로 현재 높이를 전달하는 함수
    function sendHeight() {
        const height = document.getElementById('price-board').offsetHeight + 40; // 여백 포함 높이
        window.parent.postMessage({ 
            type: 'resize_iframe', 
            height: height 
        }, '*');
    }

    async function fetchPriceData() {
        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.text();
            renderPriceList(data);
        } catch (error) {
            console.error('Fetch error:', error);
            document.getElementById('price-board').innerHTML = '<div class="loading">데이터 로드 실패</div>';
        }
    }

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        
        for (let line of lines) {
            if (!line.trim()) continue;
            
            let arr = [];
            let quote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') quote = !quote;
                else if (char === ',' && !quote) {
                    arr.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            arr.push(current.trim());
            rows.push(arr);
        }
        return rows;
    }

    function renderPriceList(csvData) {
        const parsedRows = parseCSV(csvData).slice(1); 
        
        const categories = {
            '롱폼': [],
            '숏폼': [],
            '기타 옵션': []
        };

        parsedRows.forEach(columns => {
            if (columns.length >= 3) {
                let rawCat = columns[0].replace(/^"|"$/g, '').trim();
                let name = columns[1].replace(/^"|"$/g, '').trim();
                let price = columns[2].replace(/^"|"$/g, '').trim();

                let matchedCat = '';
                const cleanCat = rawCat.replace(/\s+/g, '');

                if (cleanCat.includes('롱폼')) matchedCat = '롱폼';
                else if (cleanCat.includes('숏폼')) matchedCat = '숏폼';
                else if (cleanCat.includes('기타')) matchedCat = '기타 옵션';
                else matchedCat = rawCat;

                if (!categories[matchedCat]) categories[matchedCat] = [];
                categories[matchedCat].push({ name, price });
            }
        });

        let htmlContent = '';
        const displayOrder = ['롱폼', '숏폼', '기타 옵션'];
        
        Object.keys(categories).forEach(cat => {
            if (!displayOrder.includes(cat)) displayOrder.push(cat);
        });

        displayOrder.forEach(catName => {
            const items = categories[catName];
            if (!items || items.length === 0) return;

            htmlContent += `
                <div class="section">
                    <h2 class="section-title">${catName}</h2>
                    <div class="price-grid">
                        ${items.map(item => `
                            <div class="price-item">
                                <span class="item-name">${item.name}</span>
                                <span class="item-price">${formatPrice(item.price)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        document.getElementById('price-board').innerHTML = htmlContent;
        
        // 데이터가 화면에 그려진 후 높이 측정 및 전송
        setTimeout(sendHeight, 100); 
    }

    function formatPrice(price) {
        const num = parseInt(price.replace(/[^0-9]/g, ''));
        return !isNaN(num) ? num.toLocaleString() + '₩' : price;
    }

    // 윈도우 크기가 바뀔 때(브라우저 리사이징, 모바일 회전 등) 높이 재계산
    window.addEventListener('resize', sendHeight);

    // 초기 실행
    fetchPriceData();
</script>

</body>
</html>
