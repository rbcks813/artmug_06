<style>
    @font-face {
        font-family: 'Paperozi';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
    }
    @font-face {
        font-family: 'Paperozi';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
    }
    @font-face {
        font-family: 'Paperozi';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
        font-weight: 900;
        font-display: swap;
    }

    .form-embed-wrapper {
        all: initial; /* 주변 스타일 간섭 차단 */
        display: block;
        width: 100%;
        background-color: transparent;
        font-family: 'Paperozi', sans-serif;
    }

    .form-container {
        box-sizing: border-box;
        max-width: 650px;
        margin: 20px auto;
        background: #fdfcfb;
        border: 1px solid #e8e4de;
        padding: 35px 25px;
        border-radius: 25px;
        text-align: center;
    }

    .form-title {
        color: #4a453e;
        font-size: 24px;
        font-weight: 900;
        margin: 0 0 30px 0;
        font-family: 'Paperozi', sans-serif;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 15px;
        text-align: left;
    }

    .input-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-item label {
        font-size: 13px;
        font-weight: 700;
        color: #a6937c;
        font-family: 'Paperozi', sans-serif;
    }

    /* 입력창 및 버튼에 폰트 강제 적용 */
    .input-item input, 
    .input-item textarea, 
    .copy-btn {
        box-sizing: border-box;
        width: 100%;
        font-family: 'Paperozi', sans-serif !important; 
        outline: none;
        background: #ffffff;
        border: 1px solid #dcd7cf;
        border-radius: 10px;
    }

    .input-item input { height: 45px; padding: 0 15px; font-size: 14px; }
    .input-item textarea { height: 80px; padding: 12px 15px; resize: none; font-size: 14px; }

    .copy-btn {
        height: 55px;
        background: #a6937c;
        color: #ffffff;
        border: none;
        border-radius: 15px;
        font-weight: 900;
        font-size: 18px;
        cursor: pointer;
        margin-top: 25px;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .copy-btn:hover {
        background: #8e867a;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(166, 147, 124, 0.2);
    }
    
    .copy-btn:active {
        transform: translateY(0);
    }
</style>

<div class="form-embed-wrapper">
    <div class="form-container">
        <h3 class="form-title">신청 양식 작성</h3>
        
        <div class="input-group">
            <div class="input-item">
                <label>1. 영상 타입</label>
                <input id="v_type" placeholder="롱폼/쇼츠/종겜/토크 등">
            </div>
            <div class="input-item">
                <label>2. 영상 길이 (원본/완성본)</label>
                <input id="v_len" placeholder="예: 원본 40분 / 완성본 10분">
            </div>
            <div class="input-item">
                <label>3. 편집점 여부</label>
                <input id="v_edit" placeholder="편집점 유무를 기입해주세요">
            </div>
            <div class="input-item">
                <label>4. 영상 주제 및 레퍼런스</label>
                <input id="v_ref" placeholder="참고 링크 혹은 희망 컨셉">
            </div>
            <div class="input-item">
                <label>5. 드라이브 링크</label>
                <input id="v_link" placeholder="원본 영상 및 소스 링크">
            </div>
            <div class="input-item">
                <label>6. 그 외 요청 사항</label>
                <textarea id="v_etc" placeholder="세부적인 요청 내용을 적어주세요"></textarea>
            </div>
        </div>

        <button type="button" class="copy-btn" onclick="copyForm()">복사하기</button>
    </div>
</div>

<script>
function copyForm() {
    const n = '\n';
    const t = '[편집 신청서]' + n +
              '1. 타입: ' + (document.getElementById('v_type').value || '-') + n +
              '2. 길이: ' + (document.getElementById('v_len').value || '-') + n +
              '3. 편집점: ' + (document.getElementById('v_edit').value || '-') + n +
              '4. 레퍼런스: ' + (document.getElementById('v_ref').value || '-') + n +
              '5. 링크: ' + (document.getElementById('v_link').value || '-') + n +
              '6. 요청: ' + (document.getElementById('v_etc').value || '-');

    const e = document.createElement('textarea');
    e.value = t;
    e.style.position = 'fixed';
    e.style.left = '-9999px';
    document.body.appendChild(e);
    e.select();
    
    try {
        document.execCommand('copy');
        alert('신청서 양식이 복사되었습니다! 채팅창에 붙여넣어주세요.');
    } catch (err) {
        alert('복사에 실패했습니다.');
    }
    
    document.body.removeChild(e);
}
</script>
