<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illust Gallery - 1180px Scaled</title>
    <style>
        @font-face {
            font-family: 'DnfBitbeatV2';
            src: url('//cdn.df.nexon.com/img/common/font/DNFBitBitv2.otf') format('opentype');
            font-weight: 400;
            font-display: swap;
        }

        :root {
            /* 배경색 #FEEEEE로 변경 */
            --bg-pink: #FEEEEE;
            --image-gray: #D9D9D9;
            --white: #FFFFFF;
            --main-font: 'DnfBitbeatV2', sans-serif;
            --accent-pink: #FFB5B5;
            --aspect-ratio: 3174 / 2250; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: auto;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1180px; 
            background-color: var(--bg-pink);
            border-radius: 50px;
            padding: 30px 20px 50px 20px; 
            position: relative;
            margin: 10px auto;
        }

        .header {
            color: var(--white);
            font-size: 50px; 
            margin-bottom: 15px;
            margin-left: 75px; 
            letter-spacing: 1px;
            user-select: none;
            line-height: 1.2;
        }

        .main-wrapper {
            position: relative;
            margin: 0 75px;
            margin-bottom: 35px;
        }

        .main-display {
            width: 100%;
            aspect-ratio: var(--aspect-ratio);
            background-color: var(--image-gray);
            border-radius: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .main-image { width: 100%; height: 100%; object-fit: cover; }

        /* 버튼 클릭 애니메이션 제거 (transition 및 :active 속성 삭제) */
        .nav-btn {
            position: absolute;
            width: 45px;
            height: 45px;
            background-color: var(--white);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: var(--accent-pink);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .main-wrapper .prev-btn { left: -65px; top: 50%; transform: translateY(-50%); }
        .main-wrapper .next-btn { right: -65px; top: 50%; transform: translateY(-50%); }

        .thumb-section {
            position: relative;
            margin: 0 75px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 하단 썸네일 화살표 수직 중앙 정렬 명시 (모바일 틀어짐 방지) */
        .thumb-nav-prev { left: 0; position: absolute; top: 50%; transform: translateY(-50%); }
        .thumb-nav-next { right: 0; position: absolute; top: 50%; transform: translateY(-50%); }

        .thumb-container {
            width: calc(100% - 120px);
            overflow: hidden;
        }

        .thumb-list {
            display: flex;
            gap: 15px; 
            list-style: none;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .thumb-item {
            flex: 0 0 calc((100% - 45px) / 4); 
            aspect-ratio: var(--aspect-ratio);
            background-color: var(--white);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            border: 4px solid transparent;
        }

        .thumb-item.active { border-color: var(--accent-pink); }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .loading { color: var(--white); font-size: 18px; }

        /* --- 모바일 완벽 최적화 --- */
        @media (max-width: 768px) {
            /* 좌우 여백을 줄여 이미지 영역을 최대한 넓게 확보 */
            .container { width: 100%; padding: 20px 10px 30px 10px; border-radius: 30px; margin: 0 auto; }
            
            .header { 
                font-size: 34px; 
                margin-left: 0; 
                margin-bottom: 10px;
                text-align: center; 
            }

            .main-wrapper { margin: 0 0 20px 0; }
            .thumb-section { margin: 0 10px; } /* 썸네일 섹션 여백 조정 */

            .main-wrapper .prev-btn { left: 5px; }
            .main-wrapper .next-btn { right: 5px; }
            
            /* 모바일 화면에 맞춰 버튼 크기 살짝 축소 */
            .nav-btn { width: 32px; height: 32px; font-size: 14px; }
            
            /* 버튼 크기 축소에 맞춘 썸네일 컨테이너 너비 및 간격 재계산 */
            .thumb-container { width: calc(100% - 74px); }
            .thumb-list { gap: 6px; }
            .thumb-item { 
                flex: 0 0 calc((100% - 18px) / 4); 
                border-radius: 8px; /* 모바일에서는 모서리 곡률 살짝 축소 */
                border-width: 2px; /* 활성화 테두리 두께 축소 */
            }
        }
    </style>
</head>
<body>

<div class="container" id="galleryContainer">
    <div class="header">
        <span style="font-size: 0.7em; display: inline-block; transform: scaleY(0.85); vertical-align: middle; margin-right: 2px;">♥</span> ILLUST
    </div>

    <div class="main-wrapper">
        <button class="nav-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>
        <div class="main-display" id="mainDisplay">
            <span class="loading">LOADING...</span>
        </div>
        <button class="nav-btn next-btn" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <div class="thumb-section">
        <button class="nav-btn thumb-nav-prev" onclick="moveThumb(-1)">&#10094;</button>
        <div class="thumb-container">
            <ul class="thumb-list" id="thumbContainer"></ul>
        </div>
        <button class="nav-btn thumb-nav-next" onclick="moveThumb(1)">&#10095;</button>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBQtd81Ch1XD9iTV6me_YRFPxEBOJpHnG27HYi5aS0OTCFYJ9NRTUWs_gtpwyq79svXPc_x4GITWlH/pub?gid=0&single=true&output=csv';

    let images = [];
    let currentIndex = 0;
    let thumbOffset = 0;

    function sendHeight() {
        const height = document.getElementById('galleryContainer').offsetHeight + 40; 
        window.parent.postMessage({ type: 'resize', height: height }, '*');
    }

    async function loadSheetData() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.trim()).filter(row => row !== "");
            images = rows.slice(1).map(row => row.split(',')[0].replace(/"/g, ""));
            if(images.length > 0) renderGallery();
        } catch (e) { console.error('Load Error'); }
    }

    function renderGallery() {
        const mainDisplay = document.getElementById('mainDisplay');
        const thumbContainer = document.getElementById('thumbContainer');

        mainDisplay.innerHTML = `<img src="${images[currentIndex]}" class="main-image" onload="sendHeight()">`;
        thumbContainer.innerHTML = '';
        
        images.forEach((img, index) => {
            const li = document.createElement('li');
            li.className = `thumb-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `<img src="${img}">`;
            li.onclick = () => { 
                currentIndex = index; 
                syncThumbOffset();
                renderGallery(); 
            };
            thumbContainer.appendChild(li);
        });
        updateThumbPosition();
        sendHeight();
    }

    function changeSlide(direction) {
        if(images.length === 0) return;
        currentIndex = (currentIndex + direction + images.length) % images.length;
        syncThumbOffset();
        renderGallery();
    }

    function syncThumbOffset() {
        if (currentIndex < thumbOffset) {
            thumbOffset = currentIndex;
        } else if (currentIndex >= thumbOffset + 4) {
            thumbOffset = currentIndex - 3;
        }
    }

    function moveThumb(direction) {
        if (images.length <= 4) return;
        const maxOffset = images.length - 4;
        thumbOffset += direction;
        
        if (thumbOffset > maxOffset) thumbOffset = 0;
        else if (thumbOffset < 0) thumbOffset = maxOffset;
        
        updateThumbPosition();
    }

    function updateThumbPosition() {
        const list = document.getElementById('thumbContainer');
        if(!list || !list.children.length) return;
        const itemWidth = list.children[0].offsetWidth;
        const gap = parseInt(window.getComputedStyle(list).gap) || 15; 
        list.style.transform = `translateX(-${thumbOffset * (itemWidth + gap)}px)`;
        sendHeight();
    }

    window.addEventListener('resize', () => {
        updateThumbPosition();
        sendHeight();
    });
    
    loadSheetData();
</script>

</body>
</html>
