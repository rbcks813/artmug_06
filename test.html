<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>맛챠 디자인 찻집 - Design Commission</title>
    <style>
        /* 폰트 및 스타일 유지 */
        @font-face { font-family: 'KerisKedyuche'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_R.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        @font-face { font-family: 'KerisKedyuche'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_B.woff2') format('woff2'); font-weight: 700; font-display: swap; }
        :root { --matcha: #b6caa7; --milktea: #c3b4ad; --dark-tea: #5d6d4f; --white: #ffffff; --closed-gray: #d1d1d1; --error-red: #ff8b8b; --glass-border: rgba(255, 255, 255, 0.5); }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'KerisKedyuche', sans-serif; background: linear-gradient(145deg, #f5f2ee 0%, #e1e9db 100%); margin: 0; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; min-height: auto !important; }
        .main-wrapper { width: 100%; max-width: 900px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 48px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.08); border: 1px solid var(--glass-border); position: relative; }
        .roof-container { width: 100%; display: flex; position: absolute; top: 0; left: 0; z-index: 10; }
        .awning-piece { flex: 1; height: 35px; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; }
        .awning-piece:nth-child(odd) { background-color: var(--matcha); }
        .awning-piece:nth-child(even) { background-color: var(--milktea); }
        .header-banner { width: 100%; height: 280px; background-image: url('https://www.dropbox.com/scl/fi/mcaxat4outf55pjoawfy5/im5.png?rlkey=bedtmy74i4sup021lfayxlo5m&st=opsqwoxj&dl=1'); background-size: cover; background-position: center; }
        .profile-area { position: relative; margin-top: -85px; display: flex; flex-direction: column; align-items: center; padding: 0 20px; z-index: 15; }
        .profile-circle { width: 170px; height: 170px; background-image: url('https://www.dropbox.com/scl/fi/c6zkx7z0h9o6gyp3jqzn2/im1.png?rlkey=ese8jr1g86ufu5o0e9c0ep64s&st=zeco321d&dl=1'); background-size: cover; border-radius: 42px; border: 8px solid var(--white); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .name-tag { text-align: center; margin-top: 20px; }
        .name-tag h1 { margin: 0; font-size: 2.4rem; color: var(--dark-tea); }
        .status-badges { margin-top: 18px; display: flex; gap: 10px; justify-content: center; }
        .badge { display: inline-flex; align-items: center; padding: 0 18px; min-height: 36px; border-radius: 100px; font-size: 0.9rem; font-weight: bold; background: rgba(255,255,255,0.6); }
        .content-section { padding: 40px 50px; margin: 20px; background: rgba(255, 255, 255, 0.4); border-radius: 32px; border: 1px solid var(--glass-border); }
        .section-title { font-size: 1.5rem; color: var(--dark-tea); margin-bottom: 25px; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .info-box { background: rgba(255, 255, 255, 0.8); padding: 30px; border-radius: 24px; line-height: 1.8; }
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 24px; background: white; }
        .license-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .license-table th, .license-table td { padding: 16px; border-bottom: 1px solid #eee; text-align: center; }
        .tab-wrapper { display: flex; gap: 5px; margin-bottom: 25px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 16px; width: fit-content; }
        .tab-btn { padding: 10px 24px; border: none; border-radius: 12px; background: transparent; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .port-grid { display: none; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
        .port-grid.active { display: flex; }
        .port-item { flex-shrink: 0; height: 220px; border-radius: 28px; overflow: hidden; border: 4px solid white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #eee; font-family: inherit; }
        .submit-btn { width: 100%; padding: 20px; border: none; border-radius: 22px; background: var(--dark-tea); color: white; font-weight: 800; cursor: pointer; }
        @media (max-width: 768px) { .content-section { padding: 20px; } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="roof-container">
            <div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div><div class="awning-piece"></div>
        </div>
        <div class="header-banner"></div>

        <div class="profile-area" id="sec-intro">
            <div class="profile-circle"></div>
            <div class="name-tag"><h1>맛챠</h1><span>Matcha Design</span></div>
            <div class="status-badges"><span class="badge">#디자인</span><span class="badge">#영상편집</span></div>
        </div>

        <div class="content-section">
            <div class="info-box" style="text-align: center;">
                <p>안녕하세요 디자이너 맛챠입니다. 방송 관련 다양한 디자인 작업을 하고 있습니다.</p>
            </div>
        </div>

        <div class="content-section" id="sec-package">
            <h2 class="section-title">🍵 패키지 & 할인 안내</h2>
            <div id="package-container" class="info-box">패키지 로딩 중...</div>
        </div>

        <div class="content-section" id="sec-guide">
            <h2 class="section-title">🍵 작업 안내</h2>
            <div class="table-wrapper"><table class="license-table"><thead><tr><th>범위</th><th>개인</th><th>스트리밍</th><th>상업용</th></tr></thead><tbody><tr><td>방송용</td><td>O</td><td>O</td><td>X</td></tr></tbody></table></div>
        </div>

        <div class="content-section" id="sec-notice">
            <h2 class="section-title">🍵 공지사항</h2>
            <div class="info-box"><ul id="notice-list"><li>공지 로딩 중...</li></ul></div>
        </div>

        <div class="content-section" id="sec-portfolio">
            <h2 class="section-title">🍵 포트폴리오</h2>
            <div class="tab-wrapper">
                <button class="tab-btn active" onclick="showTab('tab1', this)">썸네일</button>
                <button class="tab-btn" onclick="showTab('tab2', this)">쇼츠틀</button>
            </div>
            <div id="tab1" class="port-grid active"></div>
            <div id="tab2" class="port-grid"></div>
        </div>

        <div class="content-section" id="sec-form">
            <h2 class="section-title">🍵 신청 양식</h2>
            <div class="form-grid"><input type="text" id="order_name" placeholder="닉네임"><input type="text" id="order_url" placeholder="주소"></div>
            <button class="submit-btn" onclick="copyForm()">신청양식 복사하기</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTc10YGXcBQD_HjeS5Yqq7-y42_qeX3JFhw__ghAy6CRpFjgx7zpm1-HVuRaCSCjI03TH4stZ_fCeX-/pub?output=csv";
        
        function sendHeight() {
            const height = document.body.scrollHeight;
            window.parent.postMessage({ type: 'resize', height: height }, '*');
        }

        window.addEventListener('message', function(e) {
            if (e.data.type === 'requestScroll') {
                const el = document.getElementById('sec-' + e.data.target);
                if (el) {
                    const top = el.getBoundingClientRect().top + window.pageYOffset;
                    window.parent.postMessage({ type: 'scrollResponse', top: top }, '*');
                }
            }
        });

        function showTab(id, btn) {
            document.querySelectorAll('.port-grid').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            sendHeight();
        }

        window.addEventListener('load', sendHeight);
        window.addEventListener('resize', sendHeight);
        new MutationObserver(sendHeight).observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
